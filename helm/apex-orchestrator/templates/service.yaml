apiVersion: v1
kind: Service
metadata:
  name: {{ include "apex-orchestrator.fullname" . }}
  labels:
    app.kubernetes.io/name: {{ include "apex-orchestrator.name" . }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: 8767
      protocol: TCP
      name: http
  selector:
    app.kubernetes.io/name: {{ include "apex-orchestrator.name" . }}
